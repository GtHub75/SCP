name: Surveillance Crous Paris

on:
  schedule:
    - cron: '*/5 6-23 * * *'  # Toutes les 5 min, de 6h à 23h (heure UTC)
  workflow_dispatch:            # Permet aussi de lancer manuellement depuis GitHub

jobs:
  check-listings:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 1. Récupère le contenu du dépôt (dont known_ids.json)
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # 2. Installe Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # 3. Installe les dépendances
      - name: Installer les dépendances
        run: pip install requests
      # 4. Lance le script de vérification
      - name: Vérifier les nouvelles annonces
        env:
          CROUS_PHPSESSID: ${{ secrets.CROUS_PHPSESSID }}
          CROUS_QPID: ${{ secrets.CROUS_QPID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_crous.py
      # 5. Sauvegarde known_ids.json dans le repo si modifié
      - name: Sauvegarder les IDs connus
        run: |
          git config user.email "crous-bot@github-actions"
          git config user.name "Crous Bot"
          git add known_ids.json
          git diff --cached --quiet || git commit -m "chore: mise à jour known_ids.json" && git push
