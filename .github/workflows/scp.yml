name: SCP

on:
  schedule:
    - cron: '*/5 * * * *'  # Toutes les 5 min, 24h/24 (fiabilise par cron-job.org)
  workflow_dispatch:         # Permet aussi de lancer manuellement depuis GitHub

jobs:
  check-listings:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install requests

      - name: Vérifier les nouvelles annonces
        env:
          CROUS_PHPSESSID: ${{ secrets.CROUS_PHPSESSID }}
          CROUS_QPID: ${{ secrets.CROUS_QPID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scp.py

      - name: Sauvegarder l'état
        run: |
          git config user.email "crous-bot@github-actions"
          git config user.name "SCP Bot"
          git add known_ids.json error_state.json
          git diff --cached --quiet || git commit -m "chore: mise à jour état" && git push
